services:
  postgres:
    image: postgres:16-alpine
    container_name: bling_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blingpass}
      POSTGRES_DB: ${POSTGRES_DB:-blingdb}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bling-sync:
    build:
      context: .
    container_name: bling_sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-America/Sao_Paulo}
      DATABASE_URL: postgres://${POSTGRES_USER:-bling}:${POSTGRES_PASSWORD:-blingpass}@postgres:5432/${POSTGRES_DB:-blingdb}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3002}
      BLING_REDIRECT_URI: ${BLING_REDIRECT_URI:-http://localhost:3002/callback}
      RUN_WORKER: ${RUN_WORKER:-true}
      RUN_DAILY_RECONCILIATION: ${RUN_DAILY_RECONCILIATION:-true}
      LOG_FILE: ${LOG_FILE:-/app/logs/bling-sync.log}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BLING_SYNC_PORT:-3002}:3000"
    volumes:
      - bling_sync_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  metabase:
    image: metabase/metabase:v0.52.10
    container_name: bling_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      JAVA_TIMEZONE: ${TZ:-America/Sao_Paulo}
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: ${POSTGRES_USER:-bling}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-blingpass}
      MB_PLUGINS_DIR: /plugins
    ports:
      - "${METABASE_PORT:-3001}:3000"
    volumes:
      - metabase_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  bling_sync_logs:
    driver: local
  metabase_plugins:
    driver: local
